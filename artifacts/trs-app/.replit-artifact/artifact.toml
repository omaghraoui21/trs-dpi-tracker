kind = "web"
previewPath = "/"
title = "TRS/OEE DPI Tracker"
version = "1.0.0"
id = "artifacts/trs-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22150

[services.development]
run = "pnpm --filter @workspace/trs-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trs-app", "run", "build" ]
publicDir = "artifacts/trs-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22150"
BASE_PATH = "/"
