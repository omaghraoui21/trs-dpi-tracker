name: Backup Supabase DB

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          sudo apt-get install -y postgresql-client
          HOST=$(echo "$DATABASE_URL" | sed -E 's|.*@([^:/]+).*|\1|')
          IPV4=$(getent ahostsv4 "$HOST" | awk 'NR==1{print $1}')
          PGHOSTADDR="$IPV4" pg_dump "$DATABASE_URL" --no-owner --no-acl -Fc -f backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload artifact (90 days retention)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: "*.dump"
          retention-days: 90
