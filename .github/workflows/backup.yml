name: Backup Supabase DB

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          sudo apt-get install -y postgresql-client
          # Force IPv4: GitHub Actions runners have no IPv6 route to Supabase
          echo 'precedence ::ffff:0:0/96 100' | sudo tee /etc/gai.conf
          pg_dump "$DATABASE_URL" --no-owner --no-acl -Fc -f backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload artifact (90 days retention)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: "*.dump"
          retention-days: 90
